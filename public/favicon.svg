<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ball body: tennis yellow-green -->
  <circle cx="32" cy="32" r="30" fill="#c8e639"/>
  <!-- Subtle shading for depth -->
  <circle cx="32" cy="32" r="30" fill="url(#shade)"/>
  <!-- Seam curves (white) -->
  <path d="M8,32 Q18,10 32,8 Q46,6 56,32"
    fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M8,32 Q18,54 32,56 Q46,58 56,32"
    fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Highlight -->
  <ellipse cx="22" cy="18" rx="8" ry="5" fill="white" opacity="0.18" transform="rotate(-30 22 18)"/>
  <defs>
    <radialGradient id="shade" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </radialGradient>
  </defs>
</svg>
